<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
  </head>
  <body>
    <script>
      (function redirectToAppNotFound() {
        const basePath = '/programmer-tools'
        const { pathname, search, hash } = window.location
        const relativePath = pathname.startsWith(basePath)
          ? pathname.slice(basePath.length) || '/'
          : pathname || '/'
        const from = encodeURIComponent(`${relativePath}${search}${hash}`)

        window.location.replace(`${basePath}/#/404?from=${from}`)
      })()
    </script>
  </body>
</html>
